<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <div class="content">
            <p id="approx">π ≈ 0</p>
            <p id="error">Error = -3.141592653589793</p>
            <p id="points">0 point(s) (0 inside, 0 outside)</p>
        </div>
        <div class="buttons">
            <button onclick="updatePi()">Add</button>
            <button onclick="incrementer()">Start</button>
            <button onclick="stopIncrementer()">Stop</button>
            <button onclick="reset()">Reset</button>
        </div>
        <div class="rank">
            <p>Rank (from best to worse):</p>
            <ol>
                <li id="frac2">355/113</li>
                <li id="frac1">22/7</li>
                <li id="decimal">3.14</li>
                <b><li id="thisapprox">This approximation</li></b>
            </ol>
        </div>
        <script src="pi.js"></script>
    </body>
</html>

<!--

IDEAS:
A "worse/better than" indicator to measure how good/bad the approximation is compared to common approximations,
such as 3.14, 22/7, and 355/113

A limit for the incrementer. Input a number, and the incrementer will stop when it reaches that number. Also show the progress
percentage to the incrementer, to see how close it is to being finished

A graph to display the points. It will have a circle, a square, green points representing points which are inside
the circle, and red points for the outside points

-->
